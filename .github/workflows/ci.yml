name: 🛡️ Cybersecurity Portfolio CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Code Quality — Lint with flake8
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Code Linting (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 lint check
        run: |
          flake8 projects/ \
            --max-line-length=100 \
            --exclude=__pycache__,*.pyc,.git \
            --count \
            --show-source \
            --statistics
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Unit Tests — pytest with coverage
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all project tests
        run: |
          pytest \
            projects/secured-voting-blockchain/test_blockchain.py \
            projects/audio-steganography-arss/test_arss.py \
            projects/network_scanner/test_scanner.py \
            projects/auth_log_analyzer/test_analyzer.py \
            projects/soc-threat-monitor/test_soc.py \
            projects/threat-intel-aggregator/test_threat_intel.py \
            --tb=short \
            -v \
            --cov=projects \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
        if: matrix.python-version == '3.11'

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Security Scan — Bandit SAST
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 SAST Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit \
            -r projects/ \
            -ll \
            --exclude projects/**/__pycache__ \
            -f txt \
            -o bandit-report.txt
        continue-on-error: true

      - name: Display Bandit results
        run: cat bandit-report.txt || echo "No issues found."

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.txt

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Dependency Audit — pip-audit
  # ─────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: 📦 Dependency Vulnerability Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known CVEs
        run: |
          pip install -r requirements.txt
          pip-audit --requirement requirements.txt --format=json --output pip-audit-report.json || true
          pip-audit --requirement requirements.txt || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: pip-audit-report.json
        if: always()

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Secret Detection — TruffleHog
  # ─────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Summary badge
  # ─────────────────────────────────────────────────────────────────────────
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan, dependency-audit]
    if: always()
    steps:
      - name: Report CI results
        run: |
          echo "======================================"
          echo "  CYBERSECURITY PORTFOLIO CI SUMMARY"
          echo "======================================"
          echo "  Lint      : ${{ needs.lint.result }}"
          echo "  Tests     : ${{ needs.test.result }}"
          echo "  Sec Scan  : ${{ needs.security-scan.result }}"
          echo "  Dep Audit : ${{ needs.dependency-audit.result }}"
          echo "======================================"
